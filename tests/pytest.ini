[tool:pytest]
minversion = 6.0
addopts = -ra -q --strict-markers
testpaths = 
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: integration tests
    unit: unit tests
    ai: tests that load AI models
log_cli = true
log_cli_level = INFO
